<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F319 Crawler — Thu thập bài viết</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --primary: #6c63ff;
            --primary-hover: #5a52e0;
            --accent: #00d4aa;
            --text: #e4e4e7;
            --text-dim: #9ca3af;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: var(--text-dim);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        /* Form */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .hint {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        input:focus, select:focus {
            border-color: var(--primary);
        }
        input.error {
            border-color: var(--danger);
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 160px 160px;
            gap: 16px;
            margin-bottom: 16px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-download {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 16px;
            font-size: 0.85rem;
        }
        .btn-download:hover {
            background: var(--accent);
            color: var(--bg);
        }

        /* Progress */
        .progress-area {
            display: none;
        }
        .progress-area.active { display: block; }
        .progress-log {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--text-dim);
        }
        .progress-log .line { margin-bottom: 2px; }
        .progress-log .line:last-child { color: var(--accent); }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .results-area { display: none; }
        .results-area.active { display: block; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-card .label {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: var(--bg);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-dim);
            white-space: nowrap;
        }
        td {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            vertical-align: top;
        }
        td.content-cell {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        tr:hover td { background: rgba(108, 99, 255, 0.05); }
        td a {
            color: var(--primary);
            text-decoration: none;
        }
        td a:hover { text-decoration: underline; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .badge-full { background: rgba(0, 212, 170, 0.15); color: var(--accent); }
        .badge-snippet { background: rgba(156, 163, 175, 0.15); color: var(--text-dim); }

        /* Error */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--danger);
            display: none;
            margin-bottom: 16px;
        }
        .error-msg.active { display: block; }

        /* Downloads */
        .download-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 1.5rem; }
        }
        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🕷️ F319 Crawler</h1>
    <p class="subtitle">Thu thập bài viết thành viên từ f319.com — nhanh chóng, hiệu quả</p>

    <div class="card">
        <form id="crawlForm">
            <div class="form-row">
                <div>
                    <label for="userIds">User ID</label>
                    <div class="hint">Format: username.userid — VD: ngokha5566.713779 (nhiều users: cách bằng dấu phẩy)</div>
                    <input type="text" id="userIds" name="user_ids" placeholder="ngokha5566.713779" autocomplete="off">
                </div>
                <div>
                    <label for="maxPosts">Số bài tối đa</label>
                    <div class="hint">Giới hạn tổng bài crawl</div>
                    <select id="maxPosts" name="max_posts">
                        <option value="0" selected>Tất cả</option>
                        <option value="20">20 bài</option>
                        <option value="50">50 bài</option>
                        <option value="100">100 bài</option>
                        <option value="200">200 bài</option>
                    </select>
                </div>
                <div>
                    <label for="fullContentLimit">Full Content</label>
                    <div class="hint">Số bài lấy full nội dung</div>
                    <select id="fullContentLimit" name="full_content_limit">
                        <option value="-1">Không lấy (nhanh nhất)</option>
                        <option value="10" selected>10 bài</option>
                        <option value="20">20 bài</option>
                        <option value="50">50 bài</option>
                        <option value="100">100 bài</option>
                        <option value="0">Tất cả (chậm)</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="btnCrawl">
                🚀 Bắt đầu Crawl
            </button>
        </form>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="progress-area" id="progressArea">
        <div class="card">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
                <div class="spinner"></div>
                <strong>Đang crawl...</strong>
            </div>
            <div class="progress-log" id="progressLog"></div>
        </div>
    </div>

    <div class="results-area" id="resultsArea">
        <div class="stats" id="statsGrid"></div>

        <div class="card">
            <h3 style="margin-bottom: 12px">Kết quả</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Tiêu đề</th>
                            <th>Nội dung</th>
                            <th>Ngày</th>
                            <th>Diễn đàn</th>
                            <th>Loại</th>
                            <th>Link</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
            <div class="download-bar" id="downloadBar"></div>
        </div>
    </div>
</div>

<script>
const form = document.getElementById('crawlForm');
const btnCrawl = document.getElementById('btnCrawl');
const inputIds = document.getElementById('userIds');
const errorMsg = document.getElementById('errorMsg');
const progressArea = document.getElementById('progressArea');
const progressLog = document.getElementById('progressLog');
const resultsArea = document.getElementById('resultsArea');
const resultsBody = document.getElementById('resultsBody');
const statsGrid = document.getElementById('statsGrid');
const downloadBar = document.getElementById('downloadBar');

let pollTimer = null;
let lastLogIndex = 0;

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Reset
    errorMsg.classList.remove('active');
    inputIds.classList.remove('error');
    resultsArea.classList.remove('active');
    progressLog.innerHTML = '';
    lastLogIndex = 0;

    const userIds = inputIds.value.trim();
    if (!userIds) {
        showError('Vui lòng nhập ít nhất một User ID');
        inputIds.classList.add('error');
        return;
    }

    // Show progress
    progressArea.classList.add('active');
    btnCrawl.disabled = true;
    btnCrawl.innerHTML = '<div class="spinner"></div> Đang xử lý...';

    const formData = new FormData(form);
    const startTime = Date.now();

    try {
        // Step 1: Start job (returns immediately)
        const res = await fetch('/crawl', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
            showError(data.error || 'Đã xảy ra lỗi');
            resetUI();
            return;
        }

        const jobId = data.job_id;
        addLog('🚀 Job started — polling for progress...');

        // Step 2: Poll for status
        pollTimer = setInterval(async () => {
            try {
                const statusRes = await fetch(`/status/${jobId}`);
                const statusData = await statusRes.json();

                // Stream new progress lines
                if (statusData.progress) {
                    for (let i = lastLogIndex; i < statusData.progress.length; i++) {
                        addLog(statusData.progress[i]);
                    }
                    lastLogIndex = statusData.progress.length;
                }

                // Check completion
                if (statusData.status === 'done') {
                    clearInterval(pollTimer);
                    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                    renderResults(statusData.results, elapsed);
                    resetUI();
                } else if (statusData.status === 'error') {
                    clearInterval(pollTimer);
                    showError(statusData.error || 'Crawl failed');
                    resetUI();
                }
            } catch (pollErr) {
                // Network error during polling — retry silently
            }
        }, 1000);

    } catch (err) {
        showError('Không thể kết nối tới server. Vui lòng thử lại.');
        resetUI();
    }
});

function resetUI() {
    btnCrawl.disabled = false;
    btnCrawl.innerHTML = '🚀 Bắt đầu Crawl';
    setTimeout(() => progressArea.classList.remove('active'), 2000);
}

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('active');
}

function addLog(msg) {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = `[${new Date().toLocaleTimeString('vi')}] ${msg}`;
    progressLog.appendChild(div);
    progressLog.scrollTop = progressLog.scrollHeight;
}

function renderResults(data, elapsed) {
    // Stats
    statsGrid.innerHTML = '';
    const stats = [
        { value: data.total_posts, label: 'Tổng bài viết' },
        { value: data.results.length, label: 'Users' },
        { value: `${elapsed}s`, label: 'Thời gian' },
        { value: data.files.length, label: 'Files CSV' },
    ];
    stats.forEach(s => {
        statsGrid.innerHTML += `
            <div class="stat-card">
                <div class="value">${s.value}</div>
                <div class="label">${s.label}</div>
            </div>`;
    });

    // Per-user rows
    resultsBody.innerHTML = '';
    data.results.forEach((user, i) => {
        const row = document.createElement('tr');
        const status = user.error
            ? `<span style="color:var(--danger)">❌ ${user.error}</span>`
            : user.post_count > 0
                ? `<span style="color:var(--success)">${user.post_count} bài viết (${user.full_content_count} full)</span>`
                : '<span style="color:var(--text-dim)">Không có bài viết</span>';
        row.innerHTML = `
            <td>${i + 1}</td>
            <td colspan="2"><strong>${user.username}</strong>.${user.userid}</td>
            <td colspan="2">${status}</td>
            <td><span class="badge badge-full">${user.full_content_count || 0} full</span></td>
            <td>${user.filename
                ? `<a href="/download/${user.filename}">📥 CSV</a>`
                : '—'}</td>`;
        resultsBody.appendChild(row);
    });

    // Downloads
    downloadBar.innerHTML = '';
    data.files.forEach(f => {
        downloadBar.innerHTML += `<a href="/download/${f}" class="btn btn-download">📥 ${f}</a>`;
    });

    resultsArea.classList.add('active');
}
</script>
</body>
</html>
